<ng-container *ngIf="gateway$ | async as gateway">
    <mat-toolbar color="primary" class="gateway-toolbar">
        <span class="toolbar-title">MET Group</span>
        <span class="spacer"></span>

        <button mat-button [routerLink]="['/gateways']">
            Listar Gateway
        </button>

        <button mat-button [routerLink]="['/gateways', gateway?.id, 'edit']">
            Editar Gateway
        </button>

        <button mat-button (click)="onLogout()">
            Cerrar sesión
        </button>
    </mat-toolbar>

    <mat-card class="gateway-detail-card mat-elevation-z4">
        <mat-card-title>{{ gateway.name }}</mat-card-title>
        <mat-card-content>
            <p><strong>Estado:</strong> {{ gateway.status }}</p>
            <p><strong>Tipo:</strong> {{ gateway.type }}</p>

            <h3>Métodos de pago</h3>
            <table mat-table [dataSource]="gateway.paymentMethods" class="mat-elevation-z8">
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef> Nombre </th>
                    <td mat-cell *matCellDef="let m">{{ m.name }}</td>
                </ng-container>

                <ng-container matColumnDef="commissionRate">
                    <th mat-header-cell *matHeaderCellDef> Comisión (%) </th>
                    <td mat-cell *matCellDef="let m">{{ m.commissionRate }}</td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="['name','commissionRate']"></tr>
                <tr mat-row *matRowDef="let row; columns: ['name','commissionRate']"></tr>
            </table>
        </mat-card-content>
    </mat-card>
</ng-container>
