<mat-toolbar color="primary" class="gateway-toolbar">
    <span class="toolbar-title">MET Group</span>
    <span class="spacer"></span>

    <button mat-button [routerLink]="['/gateways/create']">
        Crear nuevo Gateway
    </button>

    <button mat-button (click)="onLogout()">
        Cerrar sesión
    </button>
</mat-toolbar>

<mat-card class="gateway-list-card mat-elevation-z4">
    <mat-card-title>Listado de Gateways</mat-card-title>

    <mat-card-content>
        <!-- Filtros -->
        <div class="filters">
            <mat-form-field appearance="outline" class="filter-field">
                <mat-label>Filtrar por</mat-label>
                <mat-select [(ngModel)]="filters.field" (selectionChange)="clearFilters()">
                    <mat-option value="name">Nombre</mat-option>
                    <mat-option value="status">Estado</mat-option>
                    <mat-option value="type">Tipo</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline" class="filter-field" *ngIf="filters.field == 'name'">
                <mat-label>Valor</mat-label>
                <input matInput [(ngModel)]="filters.value" placeholder="Ingrese valor..." />
            </mat-form-field>

            <mat-form-field appearance="outline" class="filter-field" *ngIf="filters.field == 'status'">
                <mat-label>Valor</mat-label>
                <mat-select [(ngModel)]="filters.value">
                    <mat-option value="ACTIVE">ACTIVE</mat-option>
                    <mat-option value="INACTIVE">INACTIVE</mat-option>
                    <mat-option value="MAINTENANCE">MAINTENANCE</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline" class="filter-field" *ngIf="filters.field == 'type'">
                <mat-label>Valor</mat-label>
                <mat-select [(ngModel)]="filters.value">
                    <mat-option value="CREDIT_CARD">CREDIT_CARD</mat-option>
                    <mat-option value="BANK_TRANSFER">BANK_TRANSFER</mat-option>
                    <mat-option value="CRYPTO">CRYPTO</mat-option>
                </mat-select>
            </mat-form-field>

            <button mat-raised-button color="primary" (click)="onSearch()">Buscar</button>
        </div>

        <mat-progress-spinner *ngIf="service.state.isLoading()" mode="indeterminate"></mat-progress-spinner>

        <div *ngIf="!service.state.isLoading() && service.state.filteredItems().length === 0">
            <p>No hay resultados</p>
        </div>

        <!-- Tabla de resultados -->
        <table mat-table [dataSource]="service.state.filteredItems()" class="mat-elevation-z8 gateway-table">
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Nombre </th>
                <td mat-cell *matCellDef="let g">{{ g.name }}</td>
            </ng-container>

            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef> Estado </th>
                <td mat-cell *matCellDef="let g">{{ g.status }}</td>
            </ng-container>

            <ng-container matColumnDef="type">
                <th mat-header-cell *matHeaderCellDef> Tipo </th>
                <td mat-cell *matCellDef="let g">{{ g.type }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Acciones </th>
                <td mat-cell *matCellDef="let g">
                    <button mat-icon-button color="primary" [routerLink]="['/gateways', g.id]">
                        <mat-icon>visibility</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['name','status','type','actions']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['name','status','type','actions']"></tr>
        </table>
    </mat-card-content>
</mat-card>
